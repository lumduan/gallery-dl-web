# Development overlay — run standalone (NOT merged with docker-compose.yml):
#   docker compose -f docker-compose.dev.yml up
# Hot reload on both services; the named volume is shared with prod (same project name).
name: gallery-dl-web

services:
  backend:
    build: ./backend
    image: gallery-dl-web-backend:dev
    environment:
      DATA_DIR: /data
      DOWNLOADS_DIR: ${DOWNLOADS_DIR:-/data/downloads}
      COOKIES_PATH: /data/cookies.json
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-2}
      LOG_LEVEL: DEBUG
      ZIP_TTL_SECONDS: ${ZIP_TTL_SECONDS:-300}
      THUMBNAIL_SIZE: ${THUMBNAIL_SIZE:-300}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-30}
      HEARTBEAT_SECONDS: ${HEARTBEAT_SECONDS:-15}
      STALL_LIVENESS_SECONDS: ${STALL_LIVENESS_SECONDS:-60}
      STALL_WARMUP_SECONDS: ${STALL_WARMUP_SECONDS:-600}
      STALL_WARMUP_MAX_RETRIES: ${STALL_WARMUP_MAX_RETRIES:-1}
      STALL_FLOOR_SECONDS: ${STALL_FLOOR_SECONDS:-300}
      STALL_MULTIPLIER: ${STALL_MULTIPLIER:-4}
      STALL_CAP_SECONDS: ${STALL_CAP_SECONDS:-600}
      STALL_MAX_RETRIES: ${STALL_MAX_RETRIES:-2}
      STALL_BACKOFF: ${STALL_BACKOFF:-1.5}
      STALL_KILL_GRACE_SECONDS: ${STALL_KILL_GRACE_SECONDS:-10}
      # Make the bind-mounted src/ the importable package so edits take effect with --reload.
      PYTHONPATH: /app/src
    command:
      [
        "/opt/venv/bin/uvicorn",
        "gallery_dl_web.api.app:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]
    volumes:
      - gallery-data:/data
      - ./backend/src:/app/src
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -p 3000 -H 0.0.0.0"
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  gallery-data:
